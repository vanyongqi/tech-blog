services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    image: personal-blog:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      BLOG_ADDR: ":8080"
      BLOG_DB_PATH: "/app/storage/blog.db"
      FRONTEND_DIST: "/app/frontend-dist"
      BLOG_ADMIN_USER: "${BLOG_ADMIN_USER:-admin}"
      BLOG_ADMIN_PASSWORD: "${BLOG_ADMIN_PASSWORD:?BLOG_ADMIN_PASSWORD is required}"
      BLOG_ADMIN_SECRET: "${BLOG_ADMIN_SECRET:?BLOG_ADMIN_SECRET is required}"
      BLOG_ADMIN_COOKIE_NAME: "${BLOG_ADMIN_COOKIE_NAME:-blog_admin_session}"
      BLOG_ADMIN_COOKIE_SECURE: "${BLOG_ADMIN_COOKIE_SECURE:-false}"
      BLOG_ADMIN_SESSION_HOURS: "${BLOG_ADMIN_SESSION_HOURS:-72}"
    volumes:
      - blog_storage:/app/storage
    restart: unless-stopped

volumes:
  blog_storage:
