    <text x="912" y="504" fill="#27594C" font-size="24" font-weight="700">Changes</text>
    <text x="912" y="544" fill="#4E413C" font-size="22">时间列 + 结果级指纹</text>
    <text x="912" y="578" fill="#4E413C" font-size="22">更均衡的分布方式</text>
    <text x="912" y="612" fill="#4E413C" font-size="22">更贴近实体级过滤场景</text>

    <rect x="872" y="698" width="596" height="86" rx="18" fill="#FFF5EF" stroke="#C8602F" stroke-width="2"/>
    <text x="912" y="752" fill="#C8602F" font-size="24" font-weight="700">Redesign, not translation</text>
  </g>

  <path d="M728 532L872 532" stroke="#9C7A2A" stroke-width="6" stroke-linecap="round"/>
